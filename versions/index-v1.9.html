<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BORG XR-09 — Rhythm Composer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

  body {
    background: #26262a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    padding: 24px;
  }

  /* ===== ŠASI ===== */
  #machine {
    width: 1080px;
    background: linear-gradient(175deg, #dcd9d0 0%, #cdcac0 55%, #c2bfb4 100%);
    border: 1px solid #706c60;
    border-radius: 8px;
    box-shadow: 0 24px 60px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.5);
    overflow: hidden;
  }

  /* ===== HORNÍ BRANDING ===== */
  #header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    background: #17171a;
    padding: 14px 22px 12px;
    border-bottom: 3px solid #ff6a00;
  }
  #header .brand {
    color: #ece8dc;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 3px;
  }
  #header .brand span { color: #ff6a00; }
  #header .brand-sub {
    color: #a5a29a;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* ===== PANEL S MODULY ===== */
  #panel, #panel2 {
    display: flex;
    gap: 14px;
    padding: 18px 20px 14px;
  }
  #panel2 { padding-top: 0; }
  .module.inst .module-body { gap: 12px; padding: 12px; }
  .module.inst .knob { width: 44px; height: 44px; }
  .module.inst .knob::after { height: 12px; top: 3px; }
  .module {
    background: rgba(255,255,255,.22);
    border: 1px solid #8f8b7f;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .module.grow { flex: 1; }
  .module-label {
    background: #1c1c1f;
    color: #ded9cb;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    padding: 4px 10px;
  }
  .module-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 14px 16px;
  }

  /* ===== KNOBY ===== */
  .knob-unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .knob {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 28%, #454549, #202023 60%, #101012);
    border: 1px solid #000;
    box-shadow: 0 3px 6px rgba(0,0,0,.45), inset 0 1px 1px rgba(255,255,255,.18);
    position: relative;
    cursor: ns-resize;
    touch-action: none;
  }
  .knob::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 4px;
    width: 3px;
    height: 15px;
    margin-left: -1.5px;
    background: #ece8dc;
    border-radius: 2px;
  }
  .knob-unit label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #35332c;
    text-transform: uppercase;
  }

  /* ===== TRANSPORT ===== */
  .transport { flex-direction: column; gap: 10px; }
  .tbtn {
    width: 96px;
    padding: 9px 0;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #26241f;
    background: linear-gradient(#f1eee5, #d8d5ca);
    border: 1px solid #7d7a6e;
    border-radius: 3px;
    box-shadow: 0 2px 3px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.7);
    cursor: pointer;
  }
  .tbtn:active { transform: translateY(1px); box-shadow: 0 1px 1px rgba(0,0,0,.3); }
  .led-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #4a1410;
    border: 1px solid #2a0c08;
    box-shadow: inset 0 1px 1px rgba(0,0,0,.5);
  }
  .led-dot.on { background: #ff2e18; box-shadow: 0 0 10px rgba(255,46,24,.9); }

  /* ===== PATTERN & PRESETY ===== */
  .pattern-body { gap: 8px; }
  .bank, #btn-copy {
    height: 30px;
    font-size: 11px;
    font-weight: 700;
    color: #26241f;
    background: linear-gradient(#f1eee5, #d8d5ca);
    border: 1px solid #7d7a6e;
    border-radius: 3px;
    box-shadow: 0 2px 3px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.7);
    cursor: pointer;
  }
  .bank { width: 30px; }
  .bank.active { background: #ff6a00; color: #fff; border-color: #a34000; }
  #btn-copy { padding: 0 10px; font-size: 10px; letter-spacing: 1px; }
  #btn-copy.armed { background: #ffb060; }
  #preset-select {
    background: #1c1c1f;
    color: #ded9cb;
    border: 1px solid #000;
    border-radius: 3px;
    font-size: 11px;
    padding: 6px 8px;
    cursor: pointer;
  }

  /* ===== TEMPO DISPLEJ ===== */
  #tempo-display {
    background: #120c0a;
    color: #ff4a26;
    font-family: "Courier New", monospace;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 6px 12px;
    border-radius: 3px;
    border: 1px solid #000;
    box-shadow: inset 0 2px 6px rgba(0,0,0,.8);
    text-shadow: 0 0 8px rgba(255,74,38,.7);
    min-width: 84px;
    text-align: center;
  }

  /* ===== SEQUENCER GRID ===== */
  #steprow {
    background: #1c1c1f;
    padding: 16px 20px 18px;
    border-top: 1px solid #8f8b7f;
  }
  #steprow .row-label {
    color: #9c988c;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  #grid { display: flex; flex-direction: column; gap: 6px; }
  .ruler, .track {
    display: grid;
    grid-template-columns: 96px repeat(16, 1fr);
    gap: 6px;
  }
  .ruler .cell {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    color: #9c988c;
    padding: 2px 0 4px;
    border-bottom: 3px solid var(--g);
  }
  .ruler .cell.playing { color: #ff9040; }
  .track-label {
    background: #2b2b2f;
    color: #cfcabc;
    border: 1px solid #4a4a50;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-align: left;
    padding: 0 8px;
    cursor: pointer;
  }
  .track-label:active { background: #3a3a40; color: #ffb060; }
  .gstep {
    height: 26px;
    border-radius: 3px;
    background: linear-gradient(#e6e3d6, #cfccc0);
    border: 1px solid #55534a;
    box-shadow: 0 1px 2px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.5);
    cursor: pointer;
    position: relative;
    padding: 0;
  }
  .gstep::after {
    content: '';
    position: absolute;
    inset: 6px 7px;
    border-radius: 2px;
    background: #4a1410;
    box-shadow: inset 0 1px 1px rgba(0,0,0,.6);
  }
  .gstep.active::after { background: #ff2e18; box-shadow: 0 0 8px rgba(255,46,24,.9); }
  .gstep.playing { border-color: #ff6a00; box-shadow: 0 0 0 1px #ff6a00; }
  .gstep.active.playing::after { background: #ffb060; box-shadow: 0 0 10px rgba(255,176,96,.95); }
  .track-label.accent { color: #ffb060; cursor: default; }
  .gstep.accent.active::after { background: #ff9a20; box-shadow: 0 0 8px rgba(255,154,32,.9); }

  #footer {
    display: flex;
    justify-content: space-between;
    padding: 8px 20px 10px;
    font-size: 9px;
    letter-spacing: 2px;
    color: #6d6a5f;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="machine">
  <div id="header">
    <div class="brand">BORG <span>XR-09</span></div>

<script>
'use strict';

// ============================================================
// CONSTANTS & STATE
// ============================================================

const INSTRUMENT_IDS = ['kick', 'snare', 'clap', 'chh', 'ohh', 'ltom', 'mtom', 'htom'];

function emptyPattern() {
  const o = { accent: new Array(16).fill(false) };
  INSTRUMENT_IDS.forEach(id => o[id] = new Array(16).fill(false));
  return o;
}

const DEFAULT_PARAMS = {
  masterVol: 0.8,       // everything normalized 0–1
  swing: 0,             // 0 = straight beat, 1 = 75% shuffle
  compMix: 0.35,        // parallel compression: wet branch amount (0 = no glue)
  kickTune: 0.4,
  kickDecay: 0.5,
  kickLevel: 0.85,
  snareTune: 0.5,
  snareTone: 0.5,
  snareSnappy: 0.6,
  snareDecay: 0.4,
  snareLevel: 0.8,
  clapDecay: 0.4,
  clapLevel: 0.8,
  chhDecay: 0.3,
  ohhDecay: 0.5,
  hatLevel: 0.7,
  tomTune: 0.5,
  tomDecay: 0.5,
  tomLevel: 0.8,
};

const S = {
  playing: false,
  tempo: 120,             // BPM (40–240)
  currentStep: 0,
  bank: 0,                // active pattern A–D
  banks: [emptyPattern(), emptyPattern(), emptyPattern(), emptyPattern()],
  pattern: null,          // live reference to banks[bank]
  params: Object.assign({}, DEFAULT_PARAMS),
};
S.pattern = S.banks[S.bank];

// Instrument registry — both the sequencer and the grid UI are generated from here
const INSTRUMENTS = [
  { id: 'kick',  label: 'BASS DRUM', play: (t, v) => playKick(t, v) },
  { id: 'snare', label: 'SNARE',     play: (t, v) => playSnare(t, v) },
  { id: 'clap',  label: 'CLAP',      play: (t, v) => playClap(t, v) },
  { id: 'chh',   label: 'CLSD HAT',  play: (t, v) => playHat(t, false, v) },
  { id: 'ohh',   label: 'OPEN HAT',  play: (t, v) => playHat(t, true, v) },
  { id: 'ltom',  label: 'LOW TOM',   play: (t, v) => playTom(t, 0, v) },
  { id: 'mtom',  label: 'MID TOM',   play: (t, v) => playTom(t, 1, v) },
  { id: 'htom',  label: 'HI TOM',    play: (t, v) => playTom(t, 2, v) },
];

// ============================================================
// AUDIO ENGINE
// ============================================================

const A = {
  ctx: null, master: null, noiseBuf: null, driveCurve: null, openHats: [],
  lp: null, hp: null, sat: null, comp: null, dry: null, wet: null,   // analog bus + parallel compression
};
const COMP_MAKEUP = 1.4;   // fixed makeup gain of the wet branch

function initAudio() {
  if (A.ctx) {
    if (A.ctx.state === 'suspended') A.ctx.resume();
    return;
  }
  A.ctx = new (window.AudioContext || window.webkitAudioContext)();
  A.master = A.ctx.createGain();
  A.master.gain.value = S.params.masterVol;
  // analog bus: bandwidth of an analog chain + subtle "output stage" saturation
  A.lp = A.ctx.createBiquadFilter();
  A.lp.type = 'lowpass';
  A.lp.frequency.value = 13000;
  A.hp = A.ctx.createBiquadFilter();
  A.hp.type = 'highpass';
  A.hp.frequency.value = 30;
  A.sat = A.ctx.createWaveShaper();
  A.sat.curve = makeDriveCurve(1.3);
  A.sat.oversample = '2x';
  // parallel (NY) compression: dry always at 100%, heavily squashed wet blended in via the COMP knob
  A.comp = A.ctx.createDynamicsCompressor();
  A.comp.threshold.value = -24;
  A.comp.knee.value = 6;
  A.comp.ratio.value = 8;
  A.comp.attack.value = 0.002;
  A.comp.release.value = 0.15;
  A.dry = A.ctx.createGain();
  A.wet = A.ctx.createGain();
  A.wet.gain.value = S.params.compMix * COMP_MAKEUP;
  A.master.connect(A.lp);
  A.lp.connect(A.hp);
  A.hp.connect(A.sat);
  A.sat.connect(A.dry);
  A.dry.connect(A.ctx.destination);
  A.sat.connect(A.comp);
  A.comp.connect(A.wet);
  A.wet.connect(A.ctx.destination);
  A.noiseBuf = buildNoiseBuffer();
  A.driveCurve = makeDriveCurve(2.5);
}

// tanh saturation for WaveShaper — shared curve, node created per voice
function makeDriveCurve(amount) {
  const n = 1024;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i / (n - 1)) * 2 - 1;
    curve[i] = Math.tanh(amount * x) / Math.tanh(amount);
  }
  return curve;
}

// analog drift — every hit is slightly different (tuning, decay, level)
function drift(base, pct) {
  return base * (1 + (Math.random() * 2 - 1) * pct);
}

function buildNoiseBuffer() {
  const len = A.ctx.sampleRate;   // 1 s of white noise, shared by all voices
  const buf = A.ctx.createBuffer(1, len, A.ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  return buf;
}

// 909-style kick: sine with a pitch envelope + short click transient
function playKick(time, vel = 1) {
  const t = time !== undefined ? time : A.ctx.currentTime;
  const p = S.params;
  const f0 = drift(40 + p.kickTune * 60, 0.015);       // base tuning 40–100 Hz
  const dur = drift(0.08 + p.kickDecay * 1.1, 0.05);   // decay length 0.08–1.18 s
  const amp = Math.max(0.001, drift(p.kickLevel * vel, 0.04));

  const osc = A.ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(f0 * 3.5, t);
  osc.frequency.exponentialRampToValueAtTime(f0, t + 0.055);
  const drive = A.ctx.createWaveShaper();   // saturation = warmer body
  drive.curve = A.driveCurve;
  const vca = A.ctx.createGain();
  vca.gain.setValueAtTime(0, t);
  vca.gain.linearRampToValueAtTime(amp, t + 0.002);          // analog attack (no digital click)
  vca.gain.setTargetAtTime(amp * 0.35, t + 0.002, 0.025);    // punch — RC discharge
  vca.gain.setTargetAtTime(0.0001, t + 0.06, dur / 6);       // sub tail
  osc.connect(drive);
  drive.connect(vca);
  vca.connect(A.master);
  osc.start(t);
  osc.stop(t + dur + 0.05);

  const click = A.ctx.createBufferSource();
  click.buffer = A.noiseBuf;
  const bp = A.ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 1100;
  bp.Q.value = 1.2;
  const cg = A.ctx.createGain();
  cg.gain.setValueAtTime(amp * 0.6, t);
  cg.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
  click.connect(bp);
  bp.connect(cg);
  cg.connect(A.master);
  click.start(t);
  click.stop(t + 0.03);
}

// 909-style snare: two detuned oscillators (body) + noise (snappy)
function playSnare(time, vel = 1) {
  const t = time !== undefined ? time : A.ctx.currentTime;
  const p = S.params;
  const tune = drift(0.7 + p.snareTune * 0.7, 0.01);
  const dur = drift(0.09 + p.snareDecay * 0.35, 0.05);
  const amp = Math.max(0.001, drift(p.snareLevel * vel, 0.04));

  [185, 330].forEach(f => {
    const osc = A.ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(f * tune * 1.7, t);
    osc.frequency.exponentialRampToValueAtTime(f * tune, t + 0.03);
    const g = A.ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(amp * 0.5, t + 0.0015);
    g.gain.setTargetAtTime(0.0001, t + 0.0015, dur * 0.7 / 6);
    osc.connect(g);
    g.connect(A.master);
    osc.start(t);
    osc.stop(t + dur);
  });

  const noise = A.ctx.createBufferSource();
  noise.buffer = A.noiseBuf;
  const hp = A.ctx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 400 + p.snareTone * 6000;   // TONE = noise brightness
  const ng = A.ctx.createGain();
  const snappy = amp * (0.25 + p.snareSnappy * 0.75);
  ng.gain.setValueAtTime(0, t);
  ng.gain.linearRampToValueAtTime(snappy, t + 0.0015);
  ng.gain.setTargetAtTime(snappy * 0.35, t + 0.0015, 0.012);   // spike
  ng.gain.setTargetAtTime(0.0001, t + 0.035, dur / 6);         // tail
  noise.connect(hp);
  hp.connect(ng);
  ng.connect(A.master);
  noise.start(t);
  noise.stop(t + dur + 0.05);

  // short "crack" transient — the stick hit
  const crack = A.ctx.createBufferSource();
  crack.buffer = A.noiseBuf;
  const chp = A.ctx.createBiquadFilter();
  chp.type = 'highpass';
  chp.frequency.value = 2200;
  const cg = A.ctx.createGain();
  cg.gain.setValueAtTime(amp * 0.8, t);
  cg.gain.exponentialRampToValueAtTime(0.001, t + 0.012);
  crack.connect(chp);
  chp.connect(cg);
  cg.connect(A.master);
  crack.start(t);
  crack.stop(t + 0.02);
}

// Clap: filtered noise with a triple retrigger envelope ("flam") + decay tail
function playClap(time, vel = 1) {
  const t = time !== undefined ? time : A.ctx.currentTime;
  const p = S.params;
  const dur = drift(0.12 + p.clapDecay * 0.45, 0.05);
  const amp = Math.max(0.001, drift(p.clapLevel * vel, 0.04));

  const noise = A.ctx.createBufferSource();
  noise.buffer = A.noiseBuf;
  const bp = A.ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = drift(1150, 0.02);
  bp.Q.value = 1.6;
  const g = A.ctx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  for (let k = 0; k < 3; k++) {
    const tk = t + k * 0.0095;
    g.gain.setValueAtTime(amp, tk);
    g.gain.exponentialRampToValueAtTime(amp * 0.25, tk + 0.008);
  }
  g.gain.setValueAtTime(amp * 0.9, t + 0.0285);
  g.gain.setTargetAtTime(0.0001, t + 0.0285, dur / 6);
  noise.connect(bp);
  bp.connect(g);
  g.connect(A.master);
  noise.start(t);
  noise.stop(t + dur + 0.05);
}

// Hi-hat: six square oscillators through a highpass (metallic mix)
const HAT_RATIOS = [2, 3, 4.16, 5.43, 6.79, 8.21];

function playHat(time, open, vel = 1) {
  const t = time !== undefined ? time : A.ctx.currentTime;
  const p = S.params;
  const dur = drift(open ? 0.15 + p.ohhDecay * 0.55 : 0.025 + p.chhDecay * 0.13, 0.05);
  const amp = Math.max(0.001, drift(p.hatLevel * vel * 0.55, 0.04));

  if (!open) chokeOpenHats(t);   // closed hat chokes a ringing open hat

  // bandpass + highpass brings out a metallic "ting" instead of raw sheet metal
  const bp = A.ctx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = 10000;
  bp.Q.value = 1.1;
  const hp = A.ctx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 7500;
  const g = A.ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(amp * 2.5, t + 0.001);
  g.gain.setTargetAtTime(amp * 0.8, t + 0.001, 0.004);   // fast "ting"
  g.gain.setTargetAtTime(0.0001, t + 0.01, dur / 6);
  bp.connect(hp);
  hp.connect(g);
  g.connect(A.master);

  HAT_RATIOS.forEach(r => {
    const osc = A.ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.value = drift(130 * r, 0.004);   // a few cents different on every hit
    osc.connect(bp);
    osc.start(t);
    osc.stop(t + dur + 0.05);
  });

  if (open) A.openHats.push({ gain: g, until: t + dur });
}

function chokeOpenHats(t) {
  A.openHats = A.openHats.filter(h => {
    if (h.until > t) {
      h.gain.gain.cancelScheduledValues(t);
      h.gain.gain.setTargetAtTime(0.0001, t, 0.004);
    }
    return false;
  });
}

// Tom: tuned sine with a slow pitch drop
const TOM_FREQS = [95, 140, 195];

function playTom(time, idx, vel = 1) {
  const t = time !== undefined ? time : A.ctx.currentTime;
  const p = S.params;
  const f0 = drift(TOM_FREQS[idx] * (0.75 + p.tomTune * 0.7), 0.012);
  const dur = drift((0.18 + p.tomDecay * 0.5) * [1.25, 1, 0.85][idx], 0.05);
  const amp = Math.max(0.001, drift(p.tomLevel * vel, 0.04));

  const osc = A.ctx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(f0 * 1.5, t);
  osc.frequency.exponentialRampToValueAtTime(f0 * 0.85, t + dur);
  const g = A.ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(amp, t + 0.002);
  g.gain.setTargetAtTime(0.0001, t + 0.002, dur / 6);
  osc.connect(g);
  g.connect(A.master);
  osc.start(t);
  osc.stop(t + dur + 0.05);
}

// ============================================================
// SEQUENCER — lookahead scheduler on top of the Web Audio clock
// ============================================================

const SEQ = {
  tickMs: 25,        // JS tick interval
  aheadSec: 0.1,     // how far ahead to schedule into the audio clock
  nextTime: 0,
  step: 0,
  timer: null,
};

function seqStart() {
  initAudio();
  if (S.playing) return;
  S.playing = true;
  document.getElementById('run-led').classList.add('on');
  SEQ.step = 0;
  SEQ.nextTime = A.ctx.currentTime + 0.05;
  SEQ.timer = setInterval(seqTick, SEQ.tickMs);
}

function seqStop() {
  if (!S.playing) return;
  S.playing = false;
  document.getElementById('run-led').classList.remove('on');
  clearInterval(SEQ.timer);
  SEQ.timer = null;
  paintCursor(-1);
}

function seqTick() {
  while (SEQ.nextTime < A.ctx.currentTime + SEQ.aheadSec) {
    const stepDur = 60 / S.tempo / 4;   // 16th-note steps, tempo is read live
    // swing: odd indices (offbeat 16ths) shift by up to half a step (= 75% shuffle);
    // the SEQ.nextTime grid stays straight, the offset is only added when scheduling
    const swingOff = (SEQ.step % 2 === 1) ? S.params.swing * 0.5 * stepDur : 0;
    scheduleStep(SEQ.step, SEQ.nextTime + swingOff);
    SEQ.nextTime += stepDur;
    SEQ.step = (SEQ.step + 1) % 16;
  }
}

function scheduleStep(step, time) {
  const vel = S.pattern.accent[step] ? 1 : 0.65;   // accent raises the step velocity
  INSTRUMENTS.forEach(inst => { if (S.pattern[inst.id][step]) inst.play(time, vel); });
  // visual cursor synced to the audio time of the scheduled step
  const delayMs = Math.max(0, (time - A.ctx.currentTime) * 1000);
  setTimeout(() => { if (S.playing) paintCursor(step); }, delayMs);
}

function paintCursor(step) {
  S.currentStep = step;
  document.querySelectorAll('#grid [data-col]').forEach(el => {
    el.classList.toggle('playing', Number(el.dataset.col) === step);
  });
}

// ============================================================
// UI — KNOBS
// ============================================================

const KNOB_DEFS = {
  tempo: {
    get: () => (S.tempo - 40) / 200,
    set: v => { S.tempo = Math.round(40 + v * 200); updateTempoDisplay(); },
  },
  masterVol: {
    get: () => S.params.masterVol,
    set: v => { S.params.masterVol = v; if (A.master) A.master.gain.value = v; },
  },
  swing: { get: () => S.params.swing, set: v => S.params.swing = v },
  compMix: {
    get: () => S.params.compMix,
    set: v => { S.params.compMix = v; if (A.wet) A.wet.gain.value = v * COMP_MAKEUP; },
  },
  kickTune:  { get: () => S.params.kickTune,  set: v => S.params.kickTune = v },
  kickDecay: { get: () => S.params.kickDecay, set: v => S.params.kickDecay = v },
  kickLevel: { get: () => S.params.kickLevel, set: v => S.params.kickLevel = v },
};

// remaining instrument params — get/set directly on S.params
['snareTune', 'snareTone', 'snareSnappy', 'snareDecay', 'snareLevel',
 'clapDecay', 'clapLevel', 'chhDecay', 'ohhDecay', 'hatLevel',
 'tomTune', 'tomDecay', 'tomLevel'].forEach(k => {
  KNOB_DEFS[k] = { get: () => S.params[k], set: v => S.params[k] = v };
});

const KNOB_PAINTS = [];
function paintKnobs() { KNOB_PAINTS.forEach(f => f()); }

function initKnobs() {
  document.querySelectorAll('.knob').forEach(el => {
    const def = KNOB_DEFS[el.dataset.param];
    const paint = () => { el.style.transform = 'rotate(' + (-135 + def.get() * 270) + 'deg)'; };
    KNOB_PAINTS.push(paint);
    paint();
    el.addEventListener('pointerdown', e => {
      initAudio();
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      let lastY = e.clientY;
      const move = ev => {
        const dv = (lastY - ev.clientY) * 0.005;
        lastY = ev.clientY;
        def.set(Math.min(1, Math.max(0, def.get() + dv)));
        paint();
      };
      const up = () => {
        el.removeEventListener('pointermove', move);
        el.removeEventListener('pointerup', up);
      };
      el.addEventListener('pointermove', move);
      el.addEventListener('pointerup', up);
    });
  });
}

function updateTempoDisplay() {
  document.getElementById('tempo-display').textContent = S.tempo;
}

// ============================================================
// UI — SEQUENCER GRID
// ============================================================

const STEP_GROUP_COLORS = ['#d23a2a', '#e07820', '#d9b32a', '#efece1'];
const GRID_BTNS = {};   // instrument id -> array of step buttons (for repaint)

function buildGrid() {
  const grid = document.getElementById('grid');

  const ruler = document.createElement('div');
  ruler.className = 'ruler';
  ruler.appendChild(document.createElement('span'));   // spacer above the labels
  for (let i = 0; i < 16; i++) {
    const c = document.createElement('span');
    c.className = 'cell';
    c.dataset.col = i;
    c.style.setProperty('--g', STEP_GROUP_COLORS[i >> 2]);
    c.textContent = i + 1;
    ruler.appendChild(c);
  }
  grid.appendChild(ruler);

  const rows = INSTRUMENTS.concat([{ id: 'accent', label: 'ACCENT' }]);
  rows.forEach(inst => {
    const row = document.createElement('div');
    row.className = 'track';
    const lab = document.createElement('button');
    lab.className = 'track-label' + (inst.play ? '' : ' accent');
    lab.textContent = inst.label;
    if (inst.play) lab.addEventListener('pointerdown', () => { initAudio(); inst.play(); });
    row.appendChild(lab);
    GRID_BTNS[inst.id] = [];
    for (let i = 0; i < 16; i++) {
      const b = document.createElement('button');
      b.className = 'gstep' + (inst.play ? '' : ' accent');
      b.dataset.col = i;
      b.addEventListener('pointerdown', () => {
        initAudio();
        const arr = S.pattern[inst.id];
        arr[i] = !arr[i];
        b.classList.toggle('active', arr[i]);
      });
      row.appendChild(b);
      GRID_BTNS[inst.id].push(b);
    }
    grid.appendChild(row);
  });
}

function paintGrid() {
  Object.keys(GRID_BTNS).forEach(id => {
    GRID_BTNS[id].forEach((b, i) => b.classList.toggle('active', S.pattern[id][i]));
  });
}

// ============================================================
// TRANSPORT
// ============================================================

function initTransport() {
  document.getElementById('btn-start').addEventListener('pointerdown', seqStart);
  document.getElementById('btn-stop').addEventListener('pointerdown', seqStop);
}

// ============================================================
// PATTERNS & PRESETS (applyState / captureState)
// ============================================================

function paintBanks() {
  document.querySelectorAll('.bank').forEach((b, i) => b.classList.toggle('active', i === S.bank));
}

function initBanks() {
  const copyBtn = document.getElementById('btn-copy');
  let copyArm = false;   // COPY waiting for a target pattern
  document.querySelectorAll('.bank').forEach((b, i) => {
    b.addEventListener('pointerdown', () => {
      initAudio();
      if (copyArm) {
        S.banks[i] = JSON.parse(JSON.stringify(S.pattern));
        copyArm = false;
        copyBtn.classList.remove('armed');
      }
      S.bank = i;
      S.pattern = S.banks[i];
      paintBanks();
      paintGrid();
    });
  });
  copyBtn.addEventListener('pointerdown', () => {
    copyArm = !copyArm;
    copyBtn.classList.toggle('armed', copyArm);
  });
  paintBanks();
}

function captureState() {
  return JSON.parse(JSON.stringify({ tempo: S.tempo, bank: S.bank, params: S.params, banks: S.banks }));
}

function applyState(preset) {
  const st = JSON.parse(JSON.stringify(preset));
  S.tempo = st.tempo;
  Object.assign(S.params, st.params);
  S.banks = st.banks;
  S.bank = st.bank || 0;
  S.pattern = S.banks[S.bank];
  if (A.master) A.master.gain.value = S.params.masterVol;
  if (A.wet) A.wet.gain.value = S.params.compMix * COMP_MAKEUP;
  updateTempoDisplay();
  paintKnobs();
  paintGrid();
  paintBanks();
}

// Factory presets — pattern as a string, 'x' = active step
function st16(s) { return Array.from(s, c => c === 'x'); }

function makePattern(rows) {
  const o = emptyPattern();
  Object.keys(rows).forEach(k => o[k] = st16(rows[k]));
  return o;
}

function makePreset(tempo, tweaks, rows) {
  return {
    tempo,
    bank: 0,
    params: Object.assign({}, DEFAULT_PARAMS, tweaks),
    banks: [makePattern(rows), emptyPattern(), emptyPattern(), emptyPattern()],
  };
}

const FACTORY = {

    kick:   'x...x...x...x...',

    chh:    'x...x...x...x...',
    ohh:    '..x...x...x...x.',
    accent: 'x...x...x...x...',

  breakbeat: makePreset(102, { swing: 0.35, compMix: 0.5, snareSnappy: 0.75, kickDecay: 0.45 }, {

    snare:  '....x.......x..x',
    chh:    'x.x.x.x.x.x.x.x.',
    ohh:    '.......x........',
    accent: 'x...x.....x.x...',
  }),
  jungle: makePreset(165, { swing: 0.15, compMix: 0.45, snareSnappy: 0.8, snareDecay: 0.3, chhDecay: 0.25, kickDecay: 0.35 }, {
    // classic amen break: kick 1+1&+3&, snare 2 and 4, ghost notes 2a/3e/4a
    kick:   'x.x.......x.....',
    snare:  '....x..x.x..x..x',
    chh:    'x.x.x.x.x.x.x...',
    ohh:    '..............x.',
    accent: 'x...x.......x...',
  }),
  electro: makePreset(126, { compMix: 0.2, snareTone: 0.7, tomDecay: 0.6 }, {

    clap:   '....x.......x...',
    chh:    'x.x.x.x.x.x.x.x.',
    htom:   '.............x..',
    mtom:   '..............x.',
    ltom:   '...............x',
    accent: 'x...x...x...x...',
  }),
  techno: makePreset(132, { compMix: 0.25, kickTune: 0.35, kickDecay: 0.6, ohhDecay: 0.4 }, {
    kick:   'x...x...x...x...',
    clap:   '....x.......x...',
    chh:    'x...x...x...x...',
    ohh:    '..x...x...x...x.',
    accent: 'x...x...x...x...',
  }),
  boombap: makePreset(92, { swing: 0.4, compMix: 0.55, kickTune: 0.3, kickDecay: 0.55, snareTone: 0.4, snareSnappy: 0.65 }, {
    kick:   'x.....x..x......',
    snare:  '....x.......x...',
    chh:    'x.x.x.x.x.x.x.x.',
    accent: 'x...x.......x...',
  }),
  ukgarage: makePreset(130, { swing: 0.5, snareTone: 0.7, snareDecay: 0.3, chhDecay: 0.25 }, {
    kick:   'x......x..x.....',
    snare:  '....x.......x...',
    chh:    '..x...x...x..xx.',
    accent: 'x...x..x....x...',
  }),
  dembow: makePreset(96, { kickDecay: 0.5, snareTone: 0.55, snareDecay: 0.35 }, {
    kick:   'x...x...x...x...',
    snare:  '...x..x....x..x.',
    chh:    'x.x.x.x.x.x.x.x.',
    accent: 'x...x...x...x...',
  }),
  // liquid DnB (Technimatic / Alix Perez style): two-step, rolling ghost snares
  liquiddnb: makePreset(172, { swing: 0.1, compMix: 0.5, kickTune: 0.45, kickDecay: 0.35, snareTone: 0.65, snareSnappy: 0.7, snareDecay: 0.35, chhDecay: 0.2 }, {
    kick:   'x.........x.....',
    snare:  '....x..x....x..x',
    chh:    'x.x.x.xxx.x.x...',
    ohh:    '..............x.',

};

function initPresets() {
  document.getElementById('preset-select').addEventListener('change', e => {
    const preset = FACTORY[e.target.value];
    if (!preset) return;
    initAudio();
    applyState(preset);
  });
}

// BOOT
// ============================================================

document.addEventListener('DOMContentLoaded', () => {
  buildGrid();
  initKnobs();
  initTransport();
  initBanks();
  initPresets();
  updateTempoDisplay();
});
